<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频转文字工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 2.2em;
            color: #00d9ff;
            margin-bottom: 10px;
        }
        .header p {
            color: #888;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .left-col {
            height: fit-content;
        }
        .right-col {
            display: flex;
            flex-direction: column;
            min-height: 600px;
        }
        .right-col .card {
            flex-shrink: 0;
        }
        .right-col .card:last-child {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .right-col .card:last-child .log-container {
            flex: 1;
        }
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        .card-title {
            font-size: 1.2em;
            color: #00d9ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title .icon {
            font-size: 1.4em;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0b0;
            font-weight: 500;
        }
        .file-input-wrapper {
            position: relative;
        }
        .file-input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px dashed rgba(0,217,255,0.3);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-input:hover {
            border-color: #00d9ff;
            background: rgba(0,217,255,0.1);
        }
        .file-input.dragover {
            border-color: #00d9ff;
            background: rgba(0,217,255,0.2);
        }
        .file-list {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(0,217,255,0.1);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .file-item .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .file-item .file-name {
            color: #00d9ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-item .file-size {
            color: #888;
            font-size: 12px;
        }
        .file-item .remove-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
        }
        .file-item .remove-btn:hover {
            color: #ff4444;
        }
        .row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
        select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            border-color: #00d9ff;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .checkbox-item input {
            width: 20px;
            height: 20px;
            accent-color: #00d9ff;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: nowrap;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #1a1a2e;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,217,255,0.3);
        }
        .btn-primary:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #e0e0e0;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        .btn-warning {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
        }
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,107,107,0.3);
        }
        .btn-success {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #1a1a2e;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,255,136,0.3);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff4757 0%, #ff3344 100%);
            color: white;
        }
        /* 队列样式 */
        .queue-section {
            margin-top: 20px;
        }
        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .queue-count {
            background: rgba(0,217,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: #00d9ff;
        }
        .queue-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .queue-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 10px;
            gap: 15px;
        }
        .queue-item.current {
            background: rgba(0,217,255,0.15);
            border: 1px solid rgba(0,217,255,0.3);
        }
        .queue-item.completed {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.2);
        }
        .queue-item.error {
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.2);
        }
        .queue-item .item-status {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .queue-item.waiting .item-status {
            background: rgba(255,255,255,0.1);
            color: #888;
        }
        .queue-item.current .item-status {
            background: rgba(0,217,255,0.3);
            color: #00d9ff;
            animation: pulse 1.5s infinite;
        }
        .queue-item.completed .item-status {
            background: rgba(0,255,136,0.3);
            color: #00ff88;
        }
        .queue-item.error .item-status {
            background: rgba(255,107,107,0.3);
            color: #ff6b6b;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .queue-item .item-info {
            flex: 1;
            min-width: 0;
        }
        .queue-item .item-name {
            font-weight: 500;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .queue-item .item-progress {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .queue-item .item-progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        .queue-item .item-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 2px;
            transition: width 0.3s;
        }
        .queue-item .item-action {
            flex-shrink: 0;
        }
        .queue-item .item-action button {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: rgba(255,107,107,0.2);
            color: #ff6b6b;
        }
        .queue-item .item-action button:hover {
            background: rgba(255,107,107,0.3);
        }
        .queue-item.completed .item-action button {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
        }
        .queue-empty {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .queue-empty .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .progress-section {
            margin-top: 20px;
        }
        .progress-bar-container {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff 0%, #00ff88 100%);
            border-radius: 10px;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a2e;
            font-weight: 600;
            font-size: 14px;
        }
        .progress-info {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            text-align: center;
        }
        @media (max-width: 600px) {
            .progress-info {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .progress-item {
            background: rgba(0,0,0,0.2);
            padding: 15px 10px;
            border-radius: 10px;
        }
        .progress-item .label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        .progress-item .value {
            font-size: 14px;
            color: #00d9ff;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .log-container {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 12px;
            height: 200px;
            min-height: 150px;
            max-height: 250px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            line-height: 1.5;
        }
        .log-item {
            margin-bottom: 5px;
            display: flex;
            gap: 10px;
        }
        .log-time {
            color: #666;
        }
        .log-info { color: #00ff88; }
        .log-warning { color: #ffd93d; }
        .log-error { color: #ff6b6b; }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .status-idle { background: rgba(128,128,128,0.3); color: #888; }
        .status-running { background: rgba(0,217,255,0.2); color: #00d9ff; }
        .status-paused { background: rgba(255,217,61,0.2); color: #ffd93d; }
        .status-completed { background: rgba(0,255,136,0.2); color: #00ff88; }
        .status-error { background: rgba(255,107,107,0.2); color: #ff6b6b; }
        .status-queue { background: rgba(0,217,255,0.2); color: #00d9ff; }
        .memory-warning {
            background: rgba(255,107,107,0.2);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 10px 15px;
            margin-top: 10px;
            color: #ff6b6b;
            display: none;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #888;
            font-size: 13px;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .queue-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .queue-actions .btn {
            flex: 1;
            padding: 10px 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 视频转文字工具</h1>
            <p>本地 Whisper 转录 + MiniMax AI 润色 | 支持多文件队列处理</p>
        </div>

        <!-- 主内容区：左右两列 -->
        <div class="main-grid">
            <!-- 左侧：文件选择和设置 -->
            <div class="card left-col">
                <div class="card-title">
                    <span class="icon">📁</span>
                    文件选择
                    <span id="fileCountBadge" class="queue-count" style="margin-left: auto;">0 个文件</span>
                </div>
                <div class="form-group">
                    <label>视频文件（支持多选）</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="videoFiles" class="file-input" accept="video/*,.mp4,.avi,.mkv,.mov,.wmv,.flv,.ts,.m2ts" multiple>
                    </div>
                    <div id="fileList" class="file-list" style="display:none;"></div>
                </div>
                <div class="form-group">
                    <label>输出文件名</label>
                    <input type="text" id="outputName" class="file-input" placeholder="输出文档名称">
                </div>
                <div class="form-group">
                    <label>Whisper 模型</label>
                    <select id="modelSelect">
                        <option value="tiny">Tiny (最快)</option>
                        <option value="small" selected>Small (推荐)</option>
                        <option value="medium">Medium (效果好)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>分段时长</label>
                    <select id="chunkSelect">
                        <option value="5" selected>5 分钟</option>
                        <option value="10">10 分钟</option>
                        <option value="15">15 分钟</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>选项</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="punctuationCheck" checked>
                            本地标点
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="polishCheck">
                            MiniMax 润色 ✨
                        </label>
                    </div>
                </div>
                <div class="form-group" id="apiKeyGroup" style="display:none;">
                    <label>MiniMax API Key</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="password" id="apiKeyInput" class="file-input" placeholder="sk-cp-..." style="flex: 1;">
                        <button id="testApiBtn" class="btn btn-secondary" style="padding: 10px 15px; white-space: nowrap;">测试连接</button>
                    </div>
                    <div id="apiTestResult" style="margin-top: 8px; font-size: 13px;"></div>
                </div>
                <div class="form-group" id="minimaxModelGroup" style="display:none;">
                    <label>MiniMax 模型</label>
                    <select id="minimaxModelSelect" class="file-input">
                        <option value="">先测试API连接获取模型...</option>
                    </select>
                </div>
            </div>

            <!-- 右侧：队列和进度 -->
            <div class="right-col">
                <!-- 任务队列 -->
                <div class="card">
                    <div class="card-title">
                        <span class="icon">📋</span>
                        任务队列
                        <span id="queueCountBadge" class="queue-count" style="margin-left: auto;">0 个任务</span>
                    </div>
                    <div id="queueList" class="queue-list">
                        <div class="queue-empty">
                            <div class="icon">📂</div>
                            <div>暂无任务</div>
                            <div style="font-size: 12px; margin-top: 5px;">选择视频文件添加到队列</div>
                        </div>
                    </div>
                    <div class="queue-actions">
                        <button id="addToQueueBtn" class="btn btn-secondary">➕ 添加到队列</button>
                        <button id="startQueueBtn" class="btn btn-success" disabled>▶ 开始处理</button>
                        <button id="clearQueueBtn" class="btn btn-warning" disabled>🗑 清空队列</button>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="card">
                    <div class="card-title">
                        <span class="icon">🚀</span>
                        当前处理
                        <span id="statusBadge" class="status-badge status-idle" style="margin-left: auto;">待机</span>
                    </div>
                    <div class="btn-group">
                        <button id="startBtn" class="btn btn-primary" disabled>▶ 开始转录</button>
                        <button id="resumeBtn" class="btn btn-secondary" style="display:none;">▶ 继续</button>
                        <button id="pauseBtn" class="btn btn-secondary" disabled>⏸ 暂停</button>
                        <button id="stopBtn" class="btn btn-warning" disabled>⏹ 停止</button>
                    </div>
                </div>

                <!-- 进度显示 -->
                <div class="card">
                    <div class="card-title">
                        <span class="icon">📊</span>
                        处理进度
                    </div>
                    <div class="progress-section">
                        <div class="progress-bar-container">
                            <div id="progressBar" class="progress-bar" style="width: 0%;">0%</div>
                        </div>
                        <div class="progress-info">
                            <div class="progress-item">
                                <div class="label">阶段</div>
                                <div id="stageText" class="value">--</div>
                            </div>
                            <div class="progress-item">
                                <div class="label">片段</div>
                                <div id="chunkText" class="value">0/0</div>
                            </div>
                            <div class="progress-item">
                                <div class="label">剩余</div>
                                <div id="timeText" class="value">--</div>
                            </div>
                            <div class="progress-item">
                                <div class="label">内存</div>
                                <div id="memoryText" class="value">--</div>
                            </div>
                        </div>
                        <div id="memoryWarning" class="memory-warning">
                            ⚠️ 内存使用率过高
                        </div>
                    </div>
                </div>

                <!-- 日志 -->
                <div class="card">
                    <div class="card-title">
                        <span class="icon">📝</span>
                        日志
                    </div>
                    <div id="logContainer" class="log-container">
                        <div class="log-item">
                            <span class="log-time">[--:--:--]</span>
                            <span class="log-info">等待开始...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            Whisper 转录 | MiniMax AI 润色 | 多文件队列支持 | 
            <a href="https://weibo.com/u/3315426953" target="_blank" style="color: #00d9ff; text-decoration: none;">制作人 @科技锐评</a>
        </div>
    </div>

    <script>
        // 状态管理
        let isProcessing = false;
        let isPaused = false;
        let eventSource = null;
        let fileQueue = [];
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 10;
        let reconnectTimer = null;
        let pollTimer = null;  // 轮询定时器
        let sseConnected = false;  // SSE连接状态

        // DOM 元素
        const videoFiles = document.getElementById('videoFiles');
        const fileList = document.getElementById('fileList');
        const fileCountBadge = document.getElementById('fileCountBadge');
        const outputName = document.getElementById('outputName');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const progressBar = document.getElementById('progressBar');
        const statusBadge = document.getElementById('statusBadge');
        const stageText = document.getElementById('stageText');
        const chunkText = document.getElementById('chunkText');
        const timeText = document.getElementById('timeText');
        const memoryText = document.getElementById('memoryText');
        const memoryWarning = document.getElementById('memoryWarning');
        const logContainer = document.getElementById('logContainer');
        const polishCheck = document.getElementById('polishCheck');
        const apiKeyGroup = document.getElementById('apiKeyGroup');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const minimaxModelGroup = document.getElementById('minimaxModelGroup');
        const minimaxModelSelect = document.getElementById('minimaxModelSelect');
        const resumeBtn = document.getElementById('resumeBtn');
        const queueList = document.getElementById('queueList');
        const queueCountBadge = document.getElementById('queueCountBadge');
        const addToQueueBtn = document.getElementById('addToQueueBtn');
        const startQueueBtn = document.getElementById('startQueueBtn');
        const clearQueueBtn = document.getElementById('clearQueueBtn');

        // 保存当前视频路径用于续录
        let currentVideoPath = '';
        let currentTaskId = null;

        // 任务队列
        let taskQueue = [];

        // 更新文件列表显示
        function updateFileList() {
            if (fileQueue.length === 0) {
                fileList.style.display = 'none';
                fileCountBadge.textContent = '0 个文件';
                startBtn.disabled = true;
                return;
            }

            fileList.style.display = 'block';
            fileCountBadge.textContent = `${fileQueue.length} 个文件`;

            fileList.innerHTML = fileQueue.map((file, index) => `
                <div class="file-item" data-index="${index}">
                    <div class="file-info">
                        <span>${index + 1}.</span>
                        <span class="file-name">${file.name}</span>
                        <span class="file-size">(${formatSize(file.size)})</span>
                    </div>
                    <button class="remove-btn" onclick="removeFile(${index})">×</button>
                </div>
            `).join('');
        }

        // 移除文件
        function removeFile(index) {
            fileQueue.splice(index, 1);
            updateFileList();
        }

        // 文件选择
        videoFiles.addEventListener('change', function(e) {
            const files = Array.from(this.files);
            if (files.length > 0) {
                files.forEach(file => {
                    if (!fileQueue.find(f => f.name === file.name)) {
                        fileQueue.push(file);
                    }
                });
                updateFileList();

                // 自动设置输出文件名（第一个文件）
                const firstFile = fileQueue[0];
                const baseName = firstFile.name.replace(/\.[^/.]+$/, '');
                outputName.value = baseName + '_转录';
            }
            this.value = '';
        });

        // MiniMax润色复选框切换
        polishCheck.addEventListener('change', function() {
            apiKeyGroup.style.display = this.checked ? 'block' : 'none';
            minimaxModelGroup.style.display = this.checked ? 'block' : 'none';
            if (!this.checked) {
                apiKeyInput.value = '';
                document.getElementById('apiTestResult').innerHTML = '';
                minimaxModelSelect.innerHTML = '<option value="">先测试API连接获取模型...</option>';
            }
        });

        // 测试API连接按钮
        const testApiBtn = document.getElementById('testApiBtn');
        const apiTestResult = document.getElementById('apiTestResult');

        testApiBtn.addEventListener('click', async function() {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                apiTestResult.innerHTML = '<span style="color: #ff6b6b;">请输入 API Key</span>';
                return;
            }

            testApiBtn.disabled = true;
            testApiBtn.textContent = '测试中...';
            apiTestResult.innerHTML = '<span style="color: #888;">正在连接 MiniMax API...</span>';

            try {
                const response = await fetch('/api/minimax/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: apiKey })
                });

                const data = await response.json();

                if (data.success) {
                    apiTestResult.innerHTML = '<span style="color: #00ff88;">✓ 连接成功！</span>';
                    // 加载模型列表
                    minimaxModelSelect.innerHTML = '';
                    if (data.models && data.models.length > 0) {
                        data.models.forEach(model => {
                            const option = document.createElement('option');
                            option.value = model.id;
                            option.textContent = model.id;
                            minimaxModelSelect.appendChild(option);
                        });
                    } else {
                        minimaxModelSelect.innerHTML = '<option value="MiniMax-M2.5">MiniMax-M2.5</option>';
                    }
                } else {
                    apiTestResult.innerHTML = '<span style="color: #ff6b6b;">✗ ' + (data.error || '连接失败') + '</span>';
                    minimaxModelSelect.innerHTML = '<option value="">连接失败，请重试</option>';
                }
            } catch (error) {
                apiTestResult.innerHTML = '<span style="color: #ff6b6b;">✗ 网络错误: ' + error.message + '</span>';
            } finally {
                testApiBtn.disabled = false;
                testApiBtn.textContent = '测试连接';
            }
        });

        // 拖拽支持
        const dropZone = document.querySelector('.file-input-wrapper');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.querySelector('.file-input').classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.querySelector('.file-input').classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.querySelector('.file-input').classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f =>
                f.type.startsWith('video/') || /\.(mp4|avi|mkv|mov|wmv|flv|ts|m2ts)$/i.test(f.name)
            );
            if (files.length > 0) {
                files.forEach(file => {
                    if (!fileQueue.find(f => f.name === file.name)) {
                        fileQueue.push(file);
                    }
                });
                updateFileList();
            }
        });

        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
            return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
        }

        // 添加日志
        function addLog(message, level = 'info') {
            const now = new Date();
            const time = now.toTimeString().split(' ')[0];
            const levelClass = {
                'info': 'log-info',
                'warning': 'log-warning',
                'error': 'log-error'
            }[level];

            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="${levelClass}">${message}</span>
            `;
            logContainer.appendChild(logItem);
            requestAnimationFrame(() => {
                logContainer.scrollTop = logContainer.scrollHeight;
            });
        }

        // 更新状态显示
        function updateStatus(status, message) {
            const statusMap = {
                'idle': { text: '待机', class: 'status-idle' },
                'running': { text: '处理中', class: 'status-running' },
                'paused': { text: '已暂停', class: 'status-paused' },
                'completed': { text: '已完成', class: 'status-completed' },
                'error': { text: '异常', class: 'status-error' },
                'queue': { text: '队列中', class: 'status-queue' }
            };

            if (statusMap[status]) {
                statusBadge.textContent = statusMap[status].text;
                statusBadge.className = 'status-badge ' + statusMap[status].class;
            }

            if (message) {
                stageText.textContent = message;
            }
        }

        // 更新进度
        function updateProgress(progress, stage, chunk, total, timeLeft, memory) {
            progressBar.style.width = progress + '%';
            progressBar.textContent = progress + '%';

            if (stage) stageText.textContent = stage;
            if (chunk !== undefined) chunkText.textContent = `${chunk}/${total || '?'}`;
            if (timeLeft) timeText.textContent = timeLeft;
            if (memory) {
                memoryText.textContent = memory;
                if (memory.includes('%') && parseInt(memory) > 80) {
                    memoryWarning.style.display = 'block';
                } else {
                    memoryWarning.style.display = 'none';
                }
            }
        }

        // 添加到队列
        addToQueueBtn.addEventListener('click', function() {
            if (fileQueue.length === 0) {
                alert('请先选择视频文件');
                return;
            }

            fileQueue.forEach((file, index) => {
                const taskId = Date.now() + '_' + index;
                const outputFileName = outputName.value || '转录文档';
                const finalOutputName = fileQueue.length > 1 ? outputFileName + '_' + (index + 1) : outputFileName;

                taskQueue.push({
                    id: taskId,
                    file: file,
                    outputName: finalOutputName,
                    status: 'waiting',
                    progress: 0,
                    stage: '等待中'
                });
            });

            addLog(`已添加 ${fileQueue.length} 个任务到队列`, 'info');
            fileQueue = [];
            updateFileList();
            updateQueueDisplay();
        });

        // 更新队列显示
        function updateQueueDisplay() {
            queueCountBadge.textContent = `${taskQueue.length} 个任务`;

            if (taskQueue.length === 0) {
                queueList.innerHTML = `
                    <div class="queue-empty">
                        <div class="icon">📂</div>
                        <div>暂无任务</div>
                        <div style="font-size: 12px; margin-top: 5px;">选择视频文件添加到队列</div>
                    </div>
                `;
                startQueueBtn.disabled = true;
                clearQueueBtn.disabled = true;
                return;
            }

            startQueueBtn.disabled = false;
            clearQueueBtn.disabled = true;

            queueList.innerHTML = taskQueue.map((task, index) => {
                let statusIcon = '';
                let statusClass = '';
                let actionBtn = '';

                if (task.status === 'waiting') {
                    statusIcon = '⏳';
                    statusClass = 'waiting';
                    actionBtn = `<button onclick="removeFromQueue(${index})">移除</button>`;
                } else if (task.status === 'current') {
                    statusIcon = '🔄';
                    statusClass = 'current';
                    clearQueueBtn.disabled = true;
                } else if (task.status === 'completed') {
                    statusIcon = '✅';
                    statusClass = 'completed';
                    actionBtn = `<button onclick="removeFromQueue(${index})">移除</button>`;
                } else if (task.status === 'error') {
                    statusIcon = '❌';
                    statusClass = 'error';
                    actionBtn = `<button onclick="removeFromQueue(${index})">移除</button>`;
                }

                return `
                    <div class="queue-item ${statusClass}">
                        <div class="item-status">${statusIcon}</div>
                        <div class="item-info">
                            <div class="item-name">${task.file.name}</div>
                            <div class="item-progress">${task.stage} ${task.progress > 0 ? '- ' + task.progress + '%' : ''}</div>
                            <div class="item-progress-bar">
                                <div class="item-progress-fill" style="width: ${task.progress}%"></div>
                            </div>
                        </div>
                        <div class="item-action">${actionBtn}</div>
                    </div>
                `;
            }).join('');
        }

        // 从队列移除
        function removeFromQueue(index) {
            const task = taskQueue[index];
            if (task.status === 'current') {
                return;
            }
            taskQueue.splice(index, 1);
            updateQueueDisplay();
        }

        // 清空队列
        clearQueueBtn.addEventListener('click', function() {
            const waitingTasks = taskQueue.filter(t => t.status === 'waiting');
            if (waitingTasks.length === 0) {
                taskQueue = [];
                updateQueueDisplay();
                return;
            }
            if (confirm(`确定清空 ${waitingTasks.length} 个等待中的任务？`)) {
                taskQueue = taskQueue.filter(t => t.status === 'current' || t.status === 'completed' || t.status === 'error');
                updateQueueDisplay();
            }
        });

        // 开始处理队列
        startQueueBtn.addEventListener('click', async function() {
            const waitingTasks = taskQueue.filter(t => t.status === 'waiting');
            if (waitingTasks.length === 0) {
                addLog('队列中没有等待的任务', 'warning');
                return;
            }

            addLog(`开始处理队列，共 ${waitingTasks.length} 个任务`, 'info');
            processNextInQueue();
        });

        // 处理队列中的下一个任务
        async function processNextInQueue() {
            const nextTask = taskQueue.find(t => t.status === 'waiting');
            if (!nextTask) {
                addLog('队列已全部处理完成', 'info');
                updateStatus('idle', '完成');
                return;
            }

            nextTask.status = 'current';
            currentTaskId = nextTask.id;
            updateQueueDisplay();

            // 更新全局状态显示
            const wantPolish = polishCheck.checked;
            if (wantPolish && !apiKeyInput.value.trim()) {
                addLog('请输入 MiniMax API Key', 'error');
                nextTask.status = 'error';
                nextTask.stage = '错误';
                updateQueueDisplay();
                processNextInQueue();
                return;
            }
            if (wantPolish && !minimaxModelSelect.value) {
                addLog('请先点击"测试连接"获取可用模型', 'error');
                nextTask.status = 'error';
                nextTask.stage = '错误';
                updateQueueDisplay();
                processNextInQueue();
                return;
            }

            isProcessing = true;
            isPaused = false;

            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;

            updateStatus('running', '正在上传...');
            addLog(`[${nextTask.file.name}] 开始上传...`);

            const formData = new FormData();
            formData.append('video', nextTask.file);
            formData.append('output_name', nextTask.outputName);
            formData.append('model', document.getElementById('modelSelect').value);
            formData.append('chunk_duration', document.getElementById('chunkSelect').value);
            formData.append('punctuation', document.getElementById('punctuationCheck').checked);
            formData.append('polish', wantPolish);
            formData.append('task_id', nextTask.id);
            if (wantPolish) {
                formData.append('api_key', apiKeyInput.value.trim());
                formData.append('minimax_model', minimaxModelSelect.value);
            }

            try {
                const response = await fetch('/api/transcribe', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('服务器错误: ' + response.status);
                }

                const result = await response.json();
                currentVideoPath = result.video_path || '';

                addLog(`[${nextTask.file.name}] 视频上传完成，开始处理...`);
                startEventSource(nextTask);
            } catch (error) {
                addLog(`[${nextTask.file.name}] 错误: ${error.message}`, 'error');
                nextTask.status = 'error';
                nextTask.stage = '错误';
                updateQueueDisplay();
                resetButtons();
                processNextInQueue();
            }
        }

        // 处理进度/日志消息的通用函数
        let lastProgressStage = '';  // 记录上次阶段，避免重复日志
        function handleProgressData(data, task) {
            if (data.type === 'progress') {
                const currentTask = taskQueue.find(t => t.id === currentTaskId);
                if (currentTask) {
                    currentTask.progress = data.progress;
                    currentTask.stage = data.stage || '处理中';
                }
                // 去重：只在阶段变化时记录日志
                const stageKey = data.stage + '_' + data.current;
                if (data.stage && stageKey !== lastProgressStage) {
                    lastProgressStage = stageKey;
                    addLog(data.stage + ' ' + (data.current ? `[${data.current}/${data.total || '?'}]` : ''));
                }
                updateProgress(
                    data.progress,
                    data.stage,
                    data.current,
                    data.total,
                    data.time_left,
                    data.memory
                );
                updateQueueDisplay();
            } else if (data.type === 'log') {
                addLog(data.message, data.level);
            } else if (data.type === 'complete') {
                const currentTask = taskQueue.find(t => t.id === currentTaskId);
                if (currentTask) {
                    currentTask.status = 'completed';
                    currentTask.progress = 100;
                    currentTask.stage = '已完成';
                }
                addLog(`[${task.file.name}] ✅ 转录完成！`, 'info');
                updateStatus('completed', '已完成');
                updateProgress(100, '完成', '100%', '100%', '0秒', data.memory);
                resetButtons();
                updateQueueDisplay();

                if (data.output_path) {
                    window.location.href = '/api/download/' + encodeURIComponent(data.output_name);
                }

                setTimeout(() => {
                    processNextInQueue();
                }, 1000);
            } else if (data.type === 'error') {
                const currentTask = taskQueue.find(t => t.id === currentTaskId);
                if (currentTask) {
                    currentTask.status = 'error';
                    currentTask.stage = '错误';
                }
                addLog(`[${task.file.name}] ❌ 错误: ${data.message}`, 'error');
                updateStatus('error', '异常');
                resetButtons();
                updateQueueDisplay();

                setTimeout(() => {
                    processNextInQueue();
                }, 1000);
            } else if (data.type === 'memory_warning') {
                memoryWarning.style.display = 'block';
                addLog('⚠️ 内存使用率过高', 'warning');
            }
        }

        // 轮询获取进度（备用方案，当SSE断开时使用）
        function startPolling(task) {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(async () => {
                if (!isProcessing) {
                    clearInterval(pollTimer);
                    return;
                }
                try {
                    const response = await fetch(`/api/poll_progress/${currentTaskId}`);
                    const data = await response.json();
                    if (data.type && data.type !== 'no_data') {
                        handleProgressData(data, task);
                    }
                } catch (e) {
                    // 忽略轮询错误
                }
            }, 3000);  // 每3秒轮询一次
        }

        // 停止轮询
        function stopPolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        // 启动 SSE 连接
        function startEventSource(task) {
            if (eventSource) {
                eventSource.close();
            }
            reconnectAttempts = 0;
            sseConnected = true;

            // 开始轮询（作为备用）
            startPolling(task);

            eventSource = new EventSource('/api/progress');

            eventSource.onmessage = function(e) {
                const data = JSON.parse(e.data);

                // 重连成功后重置计数
                if (data.type === 'heartbeat') {
                    reconnectAttempts = 0;
                    sseConnected = true;
                    return;
                }

                if (data.task_id && data.task_id !== currentTaskId) {
                    return;
                }

                handleProgressData(data, task);
            };

            eventSource.onerror = function() {
                sseConnected = false;
                if (isProcessing && reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    addLog(`SSE连接中断，使用轮询恢复... (${reconnectAttempts}/${maxReconnectAttempts})`, 'warning');

                    // 不再重连SSE，依赖轮询
                    // 如果轮询恢复了，下次SSE心跳来时会自动切换回去
                } else if (reconnectAttempts >= maxReconnectAttempts) {
                    addLog('SSE重连次数过多，继续使用轮询获取进度', 'warning');
                }
            };
        }

        // 开始转录（单个文件模式）
        startBtn.addEventListener('click', async function() {
            if (!videoFiles.files.length) {
                alert('请选择视频文件');
                return;
            }

            const wantPolish = polishCheck.checked;
            if (wantPolish && !apiKeyInput.value.trim()) {
                alert('请输入 MiniMax API Key');
                return;
            }
            if (wantPolish && !minimaxModelSelect.value) {
                alert('请先点击"测试连接"获取可用模型');
                return;
            }

            const formData = new FormData();
            formData.append('video', videoFiles.files[0]);
            formData.append('output_name', outputName.value || '转录文档');
            formData.append('model', document.getElementById('modelSelect').value);
            formData.append('chunk_duration', document.getElementById('chunkSelect').value);
            formData.append('punctuation', document.getElementById('punctuationCheck').checked);
            formData.append('polish', wantPolish);
            if (wantPolish) {
                formData.append('api_key', apiKeyInput.value.trim());
                formData.append('minimax_model', minimaxModelSelect.value);
            }

            isProcessing = true;
            isPaused = false;

            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;

            updateStatus('running', '正在上传...');
            addLog('开始上传视频文件...');

            try {
                const response = await fetch('/api/transcribe', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('服务器错误: ' + response.status);
                }

                const result = await response.json();
                currentVideoPath = result.video_path || '';

                addLog('视频上传完成，开始处理...');
                updateStatus('running', '音频提取中...');

                startBtn.style.display = 'none';
                startEventSource({ id: 'single', file: { name: videoFiles.files[0].name } });
            } catch (error) {
                addLog('❌ 错误: ' + error.message, 'error');
                updateStatus('error', '异常');
                resetButtons();
            }
        });

        // 暂停
        pauseBtn.addEventListener('click', async function() {
            if (!isProcessing) return;

            try {
                if (isPaused) {
                    await fetch('/api/pause', { method: 'POST' });
                    pauseBtn.textContent = '⏸ 暂停';
                    isPaused = false;
                    updateStatus('running', '继续处理');
                    addLog('继续处理');
                } else {
                    await fetch('/api/pause', { method: 'POST' });
                    pauseBtn.textContent = '▶ 继续';
                    isPaused = true;
                    updateStatus('paused', '已暂停');
                    addLog('已暂停');
                }
            } catch (error) {
                addLog('暂停操作失败: ' + error.message, 'error');
            }
        });

        // 停止
        stopBtn.addEventListener('click', async function() {
            if (!isProcessing) return;

            if (!confirm('确定要停止吗？当前任务将被标记为错误，后续任务将继续。')) return;

            try {
                await fetch('/api/stop', { method: 'POST' });
                if (eventSource) {
                    eventSource.close();
                    eventSource = null;
                }
                addLog('已停止当前任务');
                updateStatus('idle', '已停止');

                const currentTask = taskQueue.find(t => t.id === currentTaskId);
                if (currentTask) {
                    currentTask.status = 'error';
                    currentTask.stage = '已停止';
                }
                updateQueueDisplay();

                isProcessing = false;
                startBtn.style.display = 'none';
                resumeBtn.style.display = 'none';
                pauseBtn.disabled = true;
                stopBtn.disabled = true;

                setTimeout(() => {
                    processNextInQueue();
                }, 1000);
            } catch (error) {
                addLog('停止操作失败: ' + error.message, 'error');
            }
        });

        // 继续按钮
        resumeBtn.addEventListener('click', async function() {
            if (!currentVideoPath) {
                alert('请先选择相同的视频文件继续');
                return;
            }

            const wantPolish = polishCheck.checked;
            if (wantPolish && !apiKeyInput.value.trim()) {
                alert('请输入 MiniMax API Key');
                return;
            }
            if (wantPolish && !minimaxModelSelect.value) {
                alert('请先点击"测试连接"获取可用模型');
                return;
            }

            const formData = new FormData();
            formData.append('video_path', currentVideoPath);
            formData.append('output_name', outputName.value || '转录文档');
            formData.append('model', document.getElementById('modelSelect').value);
            formData.append('chunk_duration', document.getElementById('chunkSelect').value);
            formData.append('punctuation', document.getElementById('punctuationCheck').checked);
            formData.append('polish', wantPolish);
            if (wantPolish) {
                formData.append('api_key', apiKeyInput.value.trim());
                formData.append('minimax_model', minimaxModelSelect.value);
            }

            isProcessing = true;
            resumeBtn.style.display = 'none';
            pauseBtn.disabled = false;
            stopBtn.disabled = false;

            addLog('从断点继续...');

            try {
                const response = await fetch('/api/resume', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || '续录失败');
                }

                addLog('继续转录中...');
                startEventSource({ id: 'single', file: { name: '续录任务' } });
            } catch (error) {
                addLog('续录失败: ' + error.message, 'error');
                resetButtons();
            }
        });

        // 重置按钮状态
        function resetButtons() {
            isProcessing = false;
            isPaused = false;
            stopPolling();
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            startBtn.disabled = false;
            startBtn.style.display = 'inline-block';
            resumeBtn.style.display = 'none';
            pauseBtn.disabled = true;
            pauseBtn.textContent = '⏸ 暂停';
            stopBtn.disabled = true;
        }

        // 内存监控定时器
        setInterval(async function() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                memoryText.textContent = data.memory + '%';
                if (data.memory > 80) {
                    memoryWarning.style.display = 'block';
                }
            } catch (e) {}
        }, 5000);
    </script>
</body>
</html>
